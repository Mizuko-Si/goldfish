<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金魚的一百種死法小遊戲</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #0c4a6e, #0f172a);
            overflow: hidden;
            font-family: Arial, sans-serif;
            user-select: none;
            height: 100vh;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            z-index: 10;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
        }

        h1 { margin: 0 0 5px 0; font-size: 24px; color: #e0f2fe; }
        #score-board { font-size: 18px; font-weight: bold; color: #f59e0b; margin-bottom: 12px; }

        /* 按鈕區域 */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .kill-btn {
            color: white;
            border: none;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s, opacity 0.2s;
        }
        .kill-btn:active { transform: scale(0.95); }
        
        #btn-lightning { background-color: #eab308; color: #000; } /* 黃色閃電 */
        #btn-poison { background-color: #22c55e; } /* 綠色毒藥 */
        #btn-overfeed { background-color: #ef4444; } /* 紅色撐爆 */

        /* 金魚基礎樣式 */
        .fish {
            position: absolute;
            width: 80px;
            height: 50px;
            border-radius: 50%;
            z-index: 5;
            transform-origin: center;
            transition: background-color 0.3s, width 0.3s, height 0.3s;
        }
        .fish::before {
            content: '';
            position: absolute;
            top: 12px;
            right: 15px;
            width: 10px;
            height: 10px;
            background-color: white;
            border-radius: 50%;
        }
        .fish::after {
            content: '';
            position: absolute;
            top: 15px;
            right: 15px;
            width: 5px;
            height: 5px;
            background-color: black;
            border-radius: 50%;
        }
        .fish .tail {
            position: absolute;
            left: -20px;
            top: 10px;
            width: 30px;
            height: 30px;
            clip-path: polygon(0 0, 100% 50%, 0 100%, 40% 50%);
            transition: background-color 0.3s;
        }

        /* 死亡共同特徵：眼睛變叉叉 */
        .dead-fish::before {
            content: '×';
            position: absolute;
            top: 4px;
            right: 12px;
            width: auto;
            height: auto;
            background: none;
            color: #1e293b;
            font-size: 18px;
            font-weight: bold;
        }
        .dead-fish::after { display: none; }

        /* 飼料樣式 */
        .food {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #78350f;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>Goldfish Ways to Die</h1>
        <div id="score-board">已餵食: <span id="score">0</span> | 累計死亡: <span id="dead-count">0</span></div>
        <div class="btn-group">
            <button id="btn-lightning" class="kill-btn">⚡ 電擊</button>
            <button id="btn-poison" class="kill-btn">🤢 毒殺</button>
            <button id="btn-overfeed" class="kill-btn">💥 撐爆</button>
        </div>
    </div>

    <script>
        const scoreDisplay = document.getElementById('score');
        const deadDisplay = document.getElementById('dead-count');
        
        let score = 0;
        let deadCount = 0;
        let foods = [];
        let deadFishes = [];

        const fishColors = [
            { body: '#f97316', tail: '#fb923c' }, // 橘
            { body: '#facc15', tail: '#fde047' }, // 黃
            { body: '#e2e8f0', tail: '#cbd5e1' }, // 白
            { body: '#a855f7', tail: '#c084fc' }  // 紫
        ];

        let currentFish = {
            element: null,
            tailElement: null,
            x: window.innerWidth / 2,
            y: window.innerHeight / 2,
            speed: 4,
            facing: 1,
            isDead: false
        };

        function spawnNewGoldfish(fromEdge = false) {
            if (currentFish.element && !currentFish.isDead) {
                currentFish.element.remove();
            }

            const el = document.createElement('div');
            el.className = 'fish';
            const tailEl = document.createElement('div');
            tailEl.className = 'tail';
            el.appendChild(tailEl);
            document.body.appendChild(el);

            const randomColor = fishColors[Math.floor(Math.random() * fishColors.length)];
            el.style.backgroundColor = randomColor.body;
            tailEl.style.backgroundColor = randomColor.tail;

            let startX = window.innerWidth / 2;
            let startY = window.innerHeight / 2;
            if (fromEdge) {
                startX = Math.random() > 0.5 ? -100 : window.innerWidth + 100;
                startY = Math.random() * (window.innerHeight * 0.5) + 150;
            }

            currentFish = {
                element: el,
                tailElement: tailEl,
                x: startX,
                y: startY,
                speed: 4,
                facing: 1,
                isDead: false
            };
        }

        // 初始化第一隻
        spawnNewGoldfish(false);

        // 點擊畫面丟飼料
        window.addEventListener('click', (e) => {
            if (e.target.closest('#ui-layer')) return;

            const foodEl = document.createElement('div');
            foodEl.className = 'food';
            foodEl.style.left = e.clientX + 'px';
            foodEl.style.top = e.clientY + 'px';
            document.body.appendChild(foodEl);

            foods.push({ element: foodEl, x: e.clientX, y: e.clientY });
        });

        // 核心死亡處置函式
        function killGoldfish(type) {
            if (currentFish.isDead) return;
            currentFish.isDead = true;
            deadCount++;
            deadDisplay.textContent = deadCount;

            const deadEl = currentFish.element;
            const deadTailEl = currentFish.tailElement;
            deadEl.classList.add('dead-fish');

            let deadObj = {
                element: deadEl,
                x: currentFish.x,
                y: currentFish.y,
                facing: currentFish.facing,
                type: type, // 'lightning', 'poison', 'overfeed'
                fallSpeed: 2,
                sinAngle: Math.random() * 10, // 用於中毒搖晃
                targetBottom: window.innerHeight - 30 - (Math.random() * 20)
            };

            // 根據死法改變外觀
            if (type === 'lightning') {
                deadEl.style.backgroundColor = '#1e293b'; // 焦黑
                deadTailEl.style.backgroundColor = '#334155';
                deadObj.fallSpeed = 5; // 電擊沉得快
            } else if (type === 'poison') {
                deadEl.style.backgroundColor = '#22c55e'; // 劇毒綠
                deadTailEl.style.backgroundColor = '#15803d';
                deadObj.fallSpeed = 1.2; // 中毒慢慢飄
            } else if (type === 'overfeed') {
                deadEl.style.width = '140px'; // 身體膨脹
                deadEl.style.height = '85px';
                deadObj.fallSpeed = 2.5;
            }

            deadFishes.push(deadObj);

            // 1秒後重生新魚
            setTimeout(() => {
                spawnNewGoldfish(true);
            }, 1000);
        }

        // 綁定三個按鈕事件
        document.getElementById('btn-lightning').addEventListener('click', () => killGoldfish('lightning'));
        document.getElementById('btn-poison').addEventListener('click', () => killGoldfish('poison'));
        document.getElementById('btn-overfeed').addEventListener('click', () => killGoldfish('overfeed'));

        // 遊戲物理與邏輯迴圈
        function gameLoop() {
            // 1. 飼料下沉
            for (let i = foods.length - 1; i >= 0; i--) {
                let food = foods[i];
                food.y += 1.5;
                food.element.style.top = food.y + 'px';
                if (food.y > window.innerHeight) {
                    food.element.remove();
                    foods.splice(i, 1);
                }
            }

            // 2. 活魚尋路與進食
            if (!currentFish.isDead && currentFish.element) {
                if (foods.length > 0) {
                    let targetFood = foods[0];
                    let dx = targetFood.x - currentFish.x;
                    let dy = targetFood.y - currentFish.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 35) {
                        targetFood.element.remove();
                        foods.shift();
                        score++;
                        scoreDisplay.textContent = score;
                    } else {
                        currentFish.x += (dx / distance) * currentFish.speed;
                        currentFish.y += (dy / distance) * currentFish.speed;
                        currentFish.facing = dx > 5 ? 1 : (dx < -5 ? -1 : currentFish.facing);
                    }
                } else {
                    currentFish.y += Math.sin(Date.now() / 400) * 0.4;
                }

                currentFish.element.style.left = currentFish.x + 'px';
                currentFish.element.style.top = currentFish.y + 'px';
                currentFish.element.style.transform = `translate(-50%, -50%) scaleX(${currentFish.facing})`;
            }

            // 3. 處理不同死法的屍體運動軌跡
            for (let i = 0; i < deadFishes.length; i++) {
                let dead = deadFishes[i];
                if (dead.y < dead.targetBottom) {
                    dead.y += dead.fallSpeed;
                    
                    // 特殊死法軌跡：中毒會左右晃蕩下沉
                    if (dead.type === 'poison') {
                        dead.sinAngle += 0.05;
                        dead.x += Math.sin(dead.sinAngle) * 1.5;
                    }
                    dead.element.style.top = dead.y + 'px';
                }
                dead.element.style.left = dead.x + 'px';
                
                // 根據死法套用旋轉角度（翻肚反轉）
                if (dead.type === 'overfeed') {
                    // 撐爆的魚體積大，維持大尺寸翻肚
                    dead.element.style.transform = `translate(-50%, -50%) scaleX(${dead.facing}) scaleY(-1)`;
                } else {
                    dead.element.style.transform = `translate(-50%, -50%) scaleX(${dead.facing}) scaleY(-1)`;
                }
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
