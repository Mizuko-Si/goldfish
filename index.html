<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金魚的一百種死法：魚群繁衍版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #0c4a6e, #0f172a);
            overflow: hidden;
            font-family: Arial, sans-serif;
            user-select: none;
            height: 100vh;
            position: relative;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            z-index: 100;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
        }

        h1 { margin: 0 0 5px 0; font-size: 24px; color: #e0f2fe; }
        #score-board { font-size: 18px; font-weight: bold; color: #f59e0b; margin-bottom: 12px; }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .kill-btn {
            color: white;
            border: none;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        .kill-btn:active { transform: scale(0.95); }
        
        #btn-lightning { background-color: #eab308; color: #000; }
        #btn-magnet { background-color: #06b6d4; }
        #btn-overfeed { background-color: #ef4444; }

        /* 金魚基礎樣式 */
        .fish {
            position: absolute;
            width: 80px;
            height: 50px;
            border-radius: 50%;
            z-index: 10;
            transform-origin: center;
            transition: background-color 0.3s;
        }
        .fish::before {
            content: '';
            position: absolute;
            top: 12px;
            right: 15px;
            width: 10px;
            height: 10px;
            background-color: white;
            border-radius: 50%;
        }
        .fish::after {
            content: '';
            position: absolute;
            top: 15px;
            right: 15px;
            width: 5px;
            height: 5px;
            background-color: black;
            border-radius: 50%;
        }
        .fish .tail {
            position: absolute;
            left: -20px;
            top: 10px;
            width: 30px;
            height: 30px;
            clip-path: polygon(0 0, 100% 50%, 0 100%, 40% 50%);
            transition: background-color 0.3s;
        }

        .dead-fish::before {
            content: '×';
            position: absolute;
            top: 4px;
            right: 12px;
            background: none;
            color: #1e293b;
            font-size: 18px;
            font-weight: bold;
        }
        .dead-fish::after { display: none; }

        .meat-chunk {
            position: absolute;
            background-color: #ef4444; 
            border-radius: 35% 65% 55% 45% / 45% 45% 55% 55%; 
            z-index: 9;
        }

        .food {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #78350f;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }

        .fx-particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none; 
            z-index: 80;
            animation: explode-fade 0.5s cubic-bezier(0.1, 0.8, 0.3, 1) FORWARDS;
        }

        @keyframes explode-fade {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; }
        }

        .fx-lightning-line {
            position: absolute;
            background-color: #ffffff;
            box-shadow: 0 0 12px #fde047, 0 0 4px #ffffff;
            z-index: 90;
            pointer-events: none;
            transform-origin: top left;
            animation: flash-hide 0.2s linear FORWARDS;
        }

        @keyframes flash-hide {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1>Goldfish Life & Death</h1>
        <div id="score-board">已餵食: <span id="score">0</span> | 累計死亡: <span id="dead-count">0</span></div>
        <div class="btn-group">
            <button id="btn-lightning" class="kill-btn">⚡ 全體電擊</button>
            <button id="btn-magnet" class="kill-btn">🧲 全體磁吸</button>
            <button id="btn-overfeed" class="kill-btn">💥 全體撐爆</button>
        </div>
    </div>

    <script>
        const scoreDisplay = document.getElementById('score');
        const deadDisplay = document.getElementById('dead-count');
        
        let score = 0;
        let deadCount = 0;
        let foods = [];
        let deadObjects = []; 
        let activeFishes = []; // 【關鍵重構】將單一隻魚改為活魚陣列，支援複數金魚同時游動

        const fishColors = [
            { body: '#f97316', tail: '#fb923c' },
            { body: '#facc15', tail: '#fde047' },
            { body: '#e2e8f0', tail: '#cbd5e1' },
            { body: '#a855f7', tail: '#c084fc' }
        ];

        // 產生一隻新金魚並推入活魚陣列
        function spawnSingleGoldfish(fromEdge = false) {
            const el = document.createElement('div');
            el.className = 'fish';
            const tailEl = document.createElement('div');
            tailEl.className = 'tail';
            el.appendChild(tailEl);
            document.body.appendChild(el);

            const randomColor = fishColors[Math.floor(Math.random() * fishColors.length)];
            el.style.backgroundColor = randomColor.body;
            tailEl.style.backgroundColor = randomColor.tail;

            let startX = window.innerWidth / 2;
            let startY = window.innerHeight / 2;
            if (fromEdge) {
                startX = Math.random() > 0.5 ? -100 : window.innerWidth + 100;
                startY = Math.random() * (window.innerHeight * 0.4) + 150;
            } else {
                // 初次登場隨機散落在水箱各處
                startX = Math.random() * (window.innerWidth - 200) + 100;
                startY = Math.random() * (window.innerHeight - 300) + 150;
            }

            activeFishes.push({
                element: el,
                tailElement: tailEl,
                x: startX,
                y: startY,
                speed: Math.random() * 2 + 3, // 每隻魚速度有些微差異
                facing: startX > window.innerWidth / 2 ? -1 : 1,
                seed: Math.random() * 100 // 用於閒置漂浮的隨機種子
            });
        }

        // 初始化先游進來 2 隻金魚
        spawnSingleGoldfish(false);
        spawnSingleGoldfish(false);

        window.addEventListener('click', (e) => {
            if (e.target.closest('#ui-layer') || e.target.closest('.kill-btn')) return;
            initAudio(); 

            playSound('feed');
            triggerCSSExplosion(e.clientX, e.clientY, 'feed');

            const foodEl = document.createElement('div');
            foodEl.className = 'food';
            foodEl.style.left = e.clientX + 'px';
            foodEl.style.top = e.clientY + 'px';
            document.body.appendChild(foodEl);
            foods.push({ element: foodEl, x: e.clientX, y: e.clientY });
        });

        // 毀滅機制：現在會同時殺死「畫面上所有活著的金魚」！
        function killAllGoldfishes(type) {
            if (activeFishes.length === 0) return;

            // 累計死亡數量加上目前畫面的魚數
            deadCount += activeFishes.length;
            deadDisplay.textContent = deadCount;

            // 遍歷所有活魚進行處決
            activeFishes.forEach(fish => {
                playSound(type);
                triggerCSSExplosion(fish.x, fish.y, type);

                if (type === 'lightning') {
                    triggerLightningWeb(fish.x, fish.y);
                }

                const deadEl = fish.element;
                const deadTailEl = fish.tailElement;

                if (type === 'overfeed') {
                    deadEl.remove();
                    const chunkCount = 4;
                    for (let i = 0; i < chunkCount; i++) {
                        const chunk = document.createElement('div');
                        chunk.className = 'meat-chunk';
                        const sizeW = Math.random() * 25 + 15;
                        const sizeH = Math.random() * 20 + 12;
                        chunk.style.width = sizeW + 'px';
                        chunk.style.height = sizeH + 'px';
                        document.body.appendChild(chunk);

                        const blastDirectionX = (Math.random() - 0.5) * 4; 

                        deadObjects.push({
                            element: chunk,
                            x: fish.x + (Math.random() - 0.5) * 20,
                            y: fish.y + (Math.random() - 0.5) * 10,
                            offsetX: blastDirectionX,
                            fallSpeed: Math.random() * 1.5 + 2, 
                            acceleration: 0,
                            isChunk: true,
                            transformString: `rotate(${Math.random() * 360}deg)`, 
                            targetBottom: window.innerHeight - sizeH - (Math.random() * 15)
                        });
                    }
                } else {
                    deadEl.classList.add('dead-fish');
                    let deadObj = {
                        element: deadEl,
                        x: fish.x, y: fish.y,
                        offsetX: 0,
                        fallSpeed: 2,
                        acceleration: 0,
                        isChunk: false,
                        transformString: `scaleX(${fish.facing}) scaleY(-1)`,
                        targetBottom: window.innerHeight - 30 - (Math.random() * 20)
                    };

                    if (type === 'lightning') {
                        deadEl.style.backgroundColor = '#1e293b'; 
                        deadTailEl.style.backgroundColor = '#334155';
                        deadObj.fallSpeed = 5; 
                    } else if (type === 'magnet') {
                        deadEl.style.backgroundColor = '#22d3ee'; 
                        deadTailEl.style.backgroundColor = '#0891b2';
                        deadObj.fallSpeed = 1;         
                        deadObj.acceleration = 0.5;   
                    }
                    deadObjects.push(deadObj);
                }
            });

            // 清空活魚陣列
            activeFishes = [];

            // 【隨機數量游入】1 秒後，隨機生成 1 到 3 隻新金魚從邊緣游進來
            setTimeout(() => {
                const randomSpawnCount = Math.floor(Math.random() * 3) + 1; // 隨機 1~3 隻
                for (let i = 0; i < randomSpawnCount; i++) {
                    spawnSingleGoldfish(true);
                }
            }, 1000);
        }

        // Audio
        let audioCtx = null;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playSound(type) {
            initAudio(); if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); const now = audioCtx.currentTime;
            if (type === 'lightning') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(850, now);
                for(let i=0; i<0.3; i+=0.05) osc.frequency.setValueAtTime(Math.random() * 700 + 300, now + i);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'magnet') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(500, now); osc.frequency.exponentialRampToValueAtTime(80, now + 0.4);
                gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'overfeed') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(260, now); osc.frequency.exponentialRampToValueAtTime(20, now + 0.4);
                gain.gain.setValueAtTime(0.5, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'feed') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(450, now); osc.frequency.exponentialRampToValueAtTime(180, now + 0.08);
                gain.gain.setValueAtTime(0.08, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.08);
                osc.start(now); osc.stop(now + 0.08);
            }
        }

        function triggerCSSExplosion(x, y, type) {
            let count = 25; let colors = [];
            if (type === 'lightning') colors = ['#fef08a', '#eab308', '#ffffff'];
            if (type === 'magnet') colors = ['#22d3ee', '#06b6d4', '#ffffff'];
            if (type === 'overfeed') colors = ['#ef4444', '#dc2626', '#fca5a5'];
            if (type === 'feed') { count = 5; colors = ['#7dd3fc', '#ffffff']; }
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div'); p.className = 'fx-particle';
                p.style.left = x + 'px'; p.style.top = y + 'px';
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * (type === 'overfeed' ? 140 : 80) + 20;
                p.style.setProperty('--mx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--my', Math.sin(angle) * dist + 'px');
                const size = Math.random() * 6 + 3 + 'px'; p.style.width = size; p.style.height = size;
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                document.body.appendChild(p); setTimeout(() => p.remove(), 500);
            }
        }

        document.getElementById('btn-lightning').addEventListener('click', (e) => { e.stopPropagation(); killAllGoldfishes('lightning'); });
        document.getElementById('btn-magnet').addEventListener('click', (e) => { e.stopPropagation(); killAllGoldfishes('magnet'); });
        document.getElementById('btn-overfeed').addEventListener('click', (e) => { e.stopPropagation(); killAllGoldfishes('overfeed'); });

        function createCSSLightningLine(x1, y1, x2, y2) {
            const line = document.createElement('div'); line.className = 'fx-lightning-line';
            const length = Math.sqrt((x2-x1)*(x2-x1) + (y2-y1)*(y2-y1)); const angle = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;
            line.style.width = length + 'px'; line.style.height = '3px'; line.style.left = x1 + 'px'; line.style.top = y1 + 'px';
            line.style.transform = `rotate(${angle}deg)`; document.body.appendChild(line); setTimeout(() => line.remove(), 200);
        }

        function triggerLightningWeb(tx, ty) {
            const points = [{x: tx - 150, y: 0}, {x: tx + 150, y: 0}, {x: 0, y: ty - 100}, {x: window.innerWidth, y: ty - 100}];
            points.forEach(p => {
                let midX = p.x + (tx - p.x) * 0.5 + (Math.random() - 0.5) * 60;
                let midY = p.y + (ty - p.y) * 0.5 + (Math.random() - 0.5) * 60;
                createCSSLightningLine(p.x, p.y, midX, midY); createCSSLightningLine(midX, midY, tx, ty);
            });
        }

        // 遊戲主迴圈
        function gameLoop() {
            // 1. 飼料下沉
            for (let i = foods.length - 1; i >= 0; i--) {
                let food = foods[i]; food.y += 1.5; food.element.style.top = food.y + 'px';
                if (food.y > window.innerHeight) { food.element.remove(); foods.splice(i, 1); }
            }

            // 2. 【魚群更新邏輯】個別計算每隻活魚的寻路與漂浮
            activeFishes.forEach((fish, fishIndex) => {
                if (foods.length > 0) {
                    // 每隻魚各憑本事，鎖定目前水箱裡最舊（最先丟下）的那顆飼料
                    let targetFood = foods[0]; 
                    let dx = targetFood.x - fish.x;
                    let dy = targetFood.y - fish.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 35) {
                        // 誰先走到誰就吃掉它
                        targetFood.element.remove();
                        foods.shift();
                        score++;
                        scoreDisplay.textContent = score;
                    } else {
                        // 往食物方向前進
                        fish.x += (dx / distance) * fish.speed;
                        fish.y += (dy / distance) * fish.speed;
                        fish.facing = dx > 5 ? 1 : (dx < -5 ? -1 : fish.facing);
                    }
                } else {
                    // 沒食物時，使用專屬隨機種子進行平滑的上下浮動
                    fish.y += Math.sin((Date.now() / 400) + fish.seed) * 0.4;
                }

                // 渲染單隻活魚位置與方向
                fish.element.style.left = fish.x + 'px';
                fish.element.style.top = fish.y + 'px';
                fish.element.style.transform = `translate(-50%, -50%) scaleX(${fish.facing})`;
            });

            // 3. 死物物理更新（包含所有堆疊碎肉與翻肚死魚）
            for (let i = 0; i < deadObjects.length; i++) {
                let obj = deadObjects[i];
                if (obj.y < obj.targetBottom) {
                    if (obj.acceleration > 0) obj.fallSpeed += obj.acceleration;
                    obj.y += obj.fallSpeed;
                    obj.x += obj.offsetX; 
                    obj.element.style.top = obj.y + 'px';
                } else {
                    obj.y = obj.targetBottom;
                }
                obj.element.style.left = obj.x + 'px';
                obj.element.style.transform = `translate(-50%, -50%) ${obj.transformString}`;
            }

            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
